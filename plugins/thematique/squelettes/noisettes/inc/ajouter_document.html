<head>
	<!-- Swiper CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
	<!-- Swiper JS -->
	<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
	<!-- PDF.js -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<div id="documents_portfolio" class="portfolio">
	<BOUCLE_documents_joints(DOCUMENTS){vu=non}{id_article}>
		<div class="spip_documents">
			[(#MIME_TYPE|match{image}|oui)
			<a href="#URL_DOCUMENT" class="mediabox" type="image/jpeg" data-box-min-height="90pc">
				<img src="[(#URL_DOCUMENT)]" alt="[(#TITRE)]">
			</a>
			]
			[(#MIME_TYPE|match{image}|non)
			<a href="#URL_DOCUMENT" title="[(#TITRE)]" [(#EXTENSION|!={docx}|oui)class="mediabox" ]type="#MIME_TYPE">
				[(#LOGO_DOCUMENT|image_reduire{100}|inserer_attribut{style,'border:0px solid
				#000000;'})]<span>[(#FICHIER|basename)]</span>
			</a>
			]

			[(#AUTORISER{modifier,article,#ID_ARTICLE}|oui)
			[<div class='action_supprimer'>
				<a href="(#URL_ACTION_AUTEUR{dissocier_document,#ID_ARTICLE-article-#ID_DOCUMENT-suppr-safe,#URL_SITE_SPIP/spip.php?article#ID_ARTICLE&var_mode=recalcul})"
					class='supprimer_couleur'
					onClick='return confirmation("Êtes-vous sûr de vouloir supprimer ce document ?")'
					title='Supprimer ce document'>
				</a>
			</div>]
			]
		</div>
		</BOUCLE_documents_joints>
		<script>
			// Global Swiper
			window.initFlipSwiper = function (swiperEl, opts = {}) {
				const $swiper = $(swiperEl);

				const {
					nextSelector = ".swiper-button-next-custom",
					prevSelector = ".swiper-button-prev-custom",
					paginationSelector = ".swiper-pagination",
				} = opts;

				return new Swiper(swiperEl, {
					navigation: {
						nextEl: $swiper.find(nextSelector)[0],
						prevEl: $swiper.find(prevSelector)[0],
					},
					pagination: {
						el: $swiper.find(paginationSelector)[0],
						clickable: true,
					},
					slidesPerView: 1,
					centeredSlides: true,
					spaceBetween: 0,
					speed: 500,
					loop: true,
					autoHeight: true,
					autoplay: false,
					effect: "flip",
					flipEffect: { slideShadows: false },
				});
			};
			// Image Swiper
			function initImagesSwiper() {
				const $documents_portfolio = $("#documents_portfolio");
				// Get all spip_documents image
				const $imagesDocs = $documents_portfolio
					.find(".spip_documents")
					.filter(function () {
						return $(this).find('a.mediabox[type^="image/"]').length > 0;
					});
				if (!$imagesDocs.length) return;
				// If more than 1, create a Image Swiper
				const $swiperContainer = $(`
					<div class="swiper">
						<div class="swiper-wrapper"></div>
						<div class="swiper-button-prev-custom"></div>
						<div class="swiper-button-next-custom"></div>
						<div class="swiper-pagination"></div>
					</div>
				`);
				// Create a Slide for each image
				$imagesDocs.each(function () {
					// Hide old display
					const $link = $(this).find('a.mediabox[type^="image/"]').first();
					$link.hide();
					// Generate Slide
					const $slide = $('<div class="swiper-slide"></div>');
					// Clone image to add into Swiper Slide and avoid error in Lity index
					const $imgOriginal = $link.find("img").first();
					const $imgClone = $('<img class="swiper-img">');
					$imgClone.attr("src", $imgOriginal.attr("src"));
					$imgClone.attr("alt", $imgOriginal.attr("alt"));
					$imgClone.on("click", function () {
						$link[0].click();
					});
					$slide.append($imgClone);
					// Clone & add the delete button
					const $btnSupprimer = $(this).find(".action_supprimer").first();
					if ($btnSupprimer.length) {
						$slide.append($btnSupprimer.clone(true, true));
					}
					// Append the Slide into Swiper
					$swiperContainer.find(".swiper-wrapper").append($slide);
				});
				$documents_portfolio.prepend($swiperContainer);
				// Initialize Swiper
				initFlipSwiper($swiperContainer[0]);
			}
			// PDF Swiper
			async function initPdfSwipers() {
				// Check if PDF.js is correctly loaded
				if (!window.pdfjsLib) return;
				pdfjsLib.GlobalWorkerOptions.workerSrc =
					"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
				const $documents_portfolio = $("#documents_portfolio");
				// Get all spip_documents PDF
				const $pdfDocs = $documents_portfolio
					.find(".spip_documents")
					.filter(function () {
						return $(this).find('a.mediabox[type="application/pdf"]').length > 0;
					});
				// Create a Slide for each PDF
				$pdfDocs.each(async function () {
					const $doc = $(this);
					const $link = $doc.find('a.mediabox[type="application/pdf"]').first();
					const pdfUrl = $link.attr("href");
					const pdfName = decodeURIComponent(pdfUrl.split("/").pop());
					const $imgSrc = $link.find("img").first().attr("src");
					const $container = $('<div class="swiper-pdf-container"></div>');
					// Generate Container which will contain loader and PDF Swiper
					$doc.before($container);
					// Generate Loader
					const $loader = $(`
						<div class="swiper-pdf-loader">
							<img src="${$imgSrc}"/>
							<span>Chargement de "${pdfName}"" ...</span>
						</div>
					`);
					$container.append($loader);
					// Extract delete button before deleting old display
					const $btnSupprimer = $doc.find(".action_supprimer").first();
					// Delete old display
					$doc.remove();
					// Generate PDF Swiper
					const $pdfSwiper = $(`
						<div class="pdf-swiper swiper" style="display:none;">
							<div class="swiper-wrapper"></div>
							<div class="swiper-button-prev-custom pdf-prev"></div>
							<div class="swiper-button-next-custom pdf-next"></div>
							<div class="swiper-pagination pdf-pagination"></div>
						</div>
					`);
					$container.append($pdfSwiper);
					let pdf;
					try {
						pdf = await pdfjsLib.getDocument(pdfUrl).promise;
					} catch (e) {
						$container.html(`
							<div class="swiper-pdf-loader">
								<img src="${$imgSrc}"/>
								<span>Erreur lors du chargement de "${pdfName}"</span>
							</div>
						`);
						return;
					}
					// For every PDF page, generate a slide which contains page converted to canvas.
					for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
						// Convert PDF page to canvas
						const page = await pdf.getPage(pageNum);
						const viewport = page.getViewport({ scale: 1 });
						const canvas = document.createElement("canvas");
						canvas.width = viewport.width;
						canvas.height = viewport.height;
						await page.render({
							canvasContext: canvas.getContext("2d"),
							viewport,
						}).promise;
						$(canvas).css({
							maxWidth: "100%",
							height: "auto",
							display: "block",
							margin: "0 auto",
						});
						// Generate Slide
						const $slide = $('<div class="swiper-slide"></div>');
						// Clone old link to attach old action on current Slide with corresponding page
						const $linkClone = $link.clone(false);
						$linkClone.attr("href", pdfUrl + "#page=" + pageNum);
						$linkClone.find("img, span").remove();
						$linkClone.append(canvas);
						$slide.append($linkClone);
						$linkClone.mediabox();
						// Clone delete button if it's present
						if ($btnSupprimer.length) {
							$slide.append($btnSupprimer.clone(true, true));
						}
						$pdfSwiper.find(".swiper-wrapper").append($slide);
					}
					// Hide Loader and display PDF Swiper
					$loader.remove();
					$pdfSwiper.show();
					// Initialize Swiper
					initFlipSwiper($pdfSwiper[0], {
						nextSelector: ".pdf-next",
						prevSelector: ".pdf-prev",
						paginationSelector: ".pdf-pagination",
					});
				});
			}
			// Exec
			$(function () {
				initImagesSwiper();
				initPdfSwipers();
			});
		</script>
</div>
