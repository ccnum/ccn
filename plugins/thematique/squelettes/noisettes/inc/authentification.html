#CACHE{0}
[(#SESSION{id_auteur}|oui)
<div id="menu_haut_user" class="bloc_titre">
	<div id="choix_rubrique_user" name="rubrique_user" class="select selectbox" data-select-name="rubrique_user">
		<button type="button" class="select-toggle first_label">
			<span class="icon icon-connecter"></span>
			[(#SESSION{nom})]
			<span class="icon icon-down"></span>
		</button>
		<ul class="select-options">
			<li class="select-option me-deconnecter">
				<a href="[(#URL_LOGOUT)]" title="Me déconnecter" style="display: flex; align-items: center;">
					<div class="icon icon-logout"></div>
					<div>Me déconnecter</div>
				</a>
			</li>
		</ul>
	</div>
</div>
]
[(#SESSION{id_auteur}|non)
<div id="menu_haut_user" class="bloc_titre">
	<div id="choix_connexion" name="connexion" class="select selectbox" data-select-name="connexion">
		<button type="button" class="select-toggle first_label">
			<span class="icon icon-connecter"></span>Me connecter
			<span class="icon icon-down"></span>
		</button>
		<ul class="select-options">
			[(#PLUGIN{cicas}|oui)
				<li class="select-option">
					<a href="[(#URL_PAGE{login}|parametre_url{url,#SELF}|parametre_url{cicas,oui})]" title="Se connecter à l'ENT">
						Se connecter à l'ENT
					</a>
				</li>
			]
			[(#PLUGIN{cioidc}|oui)
				<li class="select-option">
					<a href="[(#URL_PAGE{login}|parametre_url{url,#SELF}|parametre_url{action,login_cioidc})]" title="Se connecter à l'ENT">
						Se connecter à l'ENT (OpenID)
					</a>
				</li>
			]
		</ul>
	</div>
</div>
]
