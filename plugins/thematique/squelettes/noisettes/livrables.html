<div class="popup popup_livrable">
	<INCLURE{fond=noisettes/call_sidebar,type_objet, ajax} />
	[(#SESSION{role}|non)[(#INCLURE{fond=noisettes/fonction/type_role})]]
	[(#REM) ---------------- titre & logo ---------------- ]
	<div class="sidebar_bubble">
		<div class="fiche_titre">
			<div class="texte">
				<div class="titre">Livrables attendus</div>
			</div>
		</div>
	</div>
	<BOUCLE_rubAnnee(RUBRIQUES) {racine} {titre LIKE %(#CONST{_ANNEE_SCOLAIRE})%}>
		<BOUCLE_filtreConsignes(RUBRIQUES){id_parent}{titre_mot=consignes}>
			<BOUCLE_intervenants(RUBRIQUES){id_parent}>
				#SET{intervenant, #TITRE}
				<BOUCLE_filtreLivrable(ARTICLES){id_rubrique}{titre_mot=livrable}{par date}>
					<script type="text/javascript">
						$('#ajax#ID_ARTICLE').on('click', function () {
							$('div#sidebar_main').addClass('chargement');
							$('#sidebar_main').load('[(#URL_ARTICLE|parametre_url{mode,ajax-detail}|parametre_url{type_objet,consignes}|html_entity_decode)]', { limit: 25 }, function () {
								addCloseModal();
								$('div#sidebar_main').removeClass('chargement');
								$('#sidebar_main').show('slow');
							});
						});
					</script>
					<a id="ajax#ID_ARTICLE" href="#" class="hac ajax[ (#EXPOSE)]">
						<div class="livrable couleur_consignes[(#ID_RUBRIQUE|nb2col)]" data-id="[(#ID_ARTICLE)]">
							<div class="header">
								<h3>#TITRE</h3>
							</div>
							<span class="profil">
								[(#MODELE{logo_carre}{id_rubrique=#ID_RUBRIQUE}{titre=#GET{intervenant}})]
								<h4>#GET{intervenant}</h4>
							</span>
						</div>
					</a>
				</BOUCLE_filtreLivrable>
			</BOUCLE_intervenants>
		</BOUCLE_filtreConsignes>
	</BOUCLE_rubAnnee>
</div>
