<BOUCLE_principale(ARTICLES){id_article}{tout}>
	<BOUCLE_rub1(HIERARCHIE){id_rubrique}{tout}{0,1}>[(#SET{coul,[(#ID_RUBRIQUE|moins{2})]})]</BOUCLE_rub1>
	[(#MODE|!={ajax-detail}|oui)<div id="popup" [class="popup_(#GET{type_objet})"]>
		<div id="titre">
			<img class='img_titre' src="#CHEMIN{images}/puce_titrecouleur#GET{coul}.gif" alt="">
			Poster un message
		</div>

		<div id="bloc_article">
			<div id="bloc_texte">]
				[<div class="ajax">(#FORMULAIRE_FORUM{'spip.php?page=article&amp;mode=complet&amp;id_article='#VAL{id_article}|_request})</div>]
				<script>
				document.addEventListener('DOMContentLoaded', function() {
					var form = document.querySelector('#formulaire_forum form');
					if (!form) return;
					var input = form.querySelector('input[type="file"]');
					if (!input) return;
					
					input.addEventListener('change', function() {
						if (!this.files[0]) return;
						if (this.files[0].size > 100 * 1024 * 1024) {
							this.value = '';
							var errDiv = form.closest('#formulaire_forum').querySelector('.reponse_formulaire_erreur');
							if (errDiv) {
								errDiv.innerHTML = 'Le fichier dépasse la taille maximale autorisée (100 Mo).';
								errDiv.style.display = 'block';
							}
						}
					});
				});
				</script>
			[</div>
		</div>
	</div>
	(#MODE|!={ajax-detail}|oui)</div>]
</BOUCLE_principale>
