#CACHE{0}
<div>consigne pour autre</div>
<BOUCLE_rub(RUBRIQUES){id_rubrique}{tout}>
    #SET{titre_parent, #TITRE}
</BOUCLE_rub>

<BOUCLE_consigne_de_la_reponse(ARTICLES){id_article=#ENV{id_article}}>
    #SET{titre_consigne,#TITRE}
    #SET{id_consigne,#ID_ARTICLE}
</BOUCLE_consigne_de_la_reponse>

<BOUCLE_police(MOTS){id_rubrique}{type=police}>#SET{police,#TITRE}</BOUCLE_police>

<div class="[popup_(#ENV{type_objet})]">
    <div id="bloc_article-#ID_ARTICLE" class="bloc_article[ (#GET{police})]">
        #SET{titre_consigne_final, #GET{titre_consigne}|sinon{#TITRE}}
        <div id="sidebar-header-container">
            <INCLURE{
                fond=noisettes/sidebar/header_sidebar,
                id_article=#ID_ARTICLE, ajax,
                titre_parent=#GET{titre_parent},
                titre_consigne=#GET{titre_consigne_final},
                id_consigne=#GET{id_consigne},
                type_objet=#ENV{type_objet},
                env
            } />
        </div>

        <div id="tabs-article-#ID_ARTICLE" class="container-tabs">
            <div id="mission-tabs">
                <div data-title="<:thematique:description_mission:>">
                    <INCLURE{
                        fond=noisettes/sidebar/onglet_description_autre,
                        id_article=#GET{id_consigne},
                        env
                    } />
                </div>
                <div data-title="<:thematique:titre_onglet_comentaire:>">
                    <INCLURE{fond=noisettes/sidebar/onglet_commentaires, env} />
                </div>
            </div>
        </div>
    </div>
</div>
