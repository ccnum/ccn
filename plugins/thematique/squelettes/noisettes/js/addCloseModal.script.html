<script>
	/**
	 * Fonction pour éditer la modal en plaçant:
     *  - En haut à gauche : Le bouton like
     *  - En haut à droite : Le bouton de fermeture de la modal
	 */
    function addCloseModal() {
        let bgColor = $('#sidebar_main .fiche_titre')
            .first()
            .css('background-color');
        if (!bgColor) {
            bgColor = $('#sidebar_main .popup_titre')
                .first()
                .css('background-color');
        }

        const $originalLikeForm = $(
            '#sidebar_main .formulaire_jaime_flottant',
        );
        const $closeButton = $(`
            <div
                id="sidebarCloseButtonContainer"
                style="
                    display: flex;
                    width: 100%;
                    justify-content: ${$originalLikeForm.length ? 'space-between' : 'flex-end'};
                    background-color: ${bgColor};
                    align-items: center;
            ">
                <div
                    id="sidebarCloseButton"
                    class="tooltip_bottom_left"
                    data-tip="Fermer la modale"
                    aria-label="Fermer la modale"
                    style="width: fit-content;margin-bottom:-60px;"
                >
                    <span class="icon icon-close"></span>
                </div>
            </div>
        `);

        if ($originalLikeForm.length) {
            $closeButton.prepend($originalLikeForm.detach());
        }
        $('#sidebar_main .sidebar_bubble').first().prepend($closeButton);
        $('#sidebarCloseButton').on('click', closeModal);
    }
</script>
