[(#REM)
-href
-filter
-class
-title
-valeur
-style
-onclick
-texte
-NUMERO
-ICONE
]
<li class="logo" style="position: relative;">
	<a 	[href="(#HREF)"]
		[rel="(#REL)"]
		[data-filter-value="(#FILTER)"]
		[data-option-value="(#OPTION)"]
		onClick="callClasse(#ID_RUBRIQUE);"
		class="[(#TEXTE|=={''}|oui)[logo_menu-(#VALEUR)]] #CLASS logo_menu_classe tooltip bgc_classe_#ENV{NUMERO}"
		data-tip="#TITLE">
		<span role="img" aria-label="#TITLE" style="font-size:min(70cqw,70cqh)">
			#ENV{ICONE}
		</span>
	</a>
</li>
