<BOUCLE_ressource(ARTICLES){id_article}>
	<BOUCLE_auteur(RUBRIQUES){id_rubrique}>#SET{auteur_consigne,#TITRE}</BOUCLE_auteur>
	<div class="actualites-actu bgc_classe_[(#ID_RUBRIQUE|nb2col)] js-call-consigne" data-id-objet="#ID_ARTICLE">
		<span class="profil">[(#MODELE{logo_carre, taille=17}{id_rubrique=#ID_RUBRIQUE}{titre=#TITRE})]</span>
		<span class="actualites-titre"><b>#GET{auteur_consigne}</b> à publié <b>#TITRE</b> sur <b>l'espace Ressources</span><br>
		<p class="actualites-actu-date">[(#DATE_MODIF|affdate)]</p>
	</div>
</BOUCLE_ressource>
