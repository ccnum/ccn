[(#REM)
	Presenter les regles du jeu du forum sur abonnement
	avec un lien vers la connexion / l'inscription / le rappel
]
<fieldset>
	<div class="login-forum-bloc">
		<p class="login-message">Veuillez vous <b>connecter</b> ou vous <b>enregistrer</b> pour <b>commenter</b>.</p>
		<legend><:Forum:> <:bouton_radio_modere_abonnement:></legend>
		<!-- <p class="explication"><:forum_vous_enregistrer:> <:forum_vous_inscrire:></p> -->
		<p class="retour">
			<div class="login-forum-buttons">
				<a href="[(#URL_PAGE{login}|parametre_url{url,#SELF})]"><span class="icon icon-connecter"></span>Me connecter</a>
				<a href="(#ENV{inscription})&amp;mode=6forum[(&amp;id_rubrique=(#ENV{id_rubrique})]&amp;focus=nom_inscription" target="spip_pass" onclick="javascript:window.open(this.href, 'spip_pass', 'scrollbars=yes, resizable=yes, width=480, height=340'); return false;"><span class="icon icon-s-enregistrer"></span><:login_sinscrire:></a>
			</div>
			<div class="login-forum-password">
				<a href="(#ENV{oubli})" target="spip_pass" onclick="javascript:window.open(this.href, 'spip_pass', 'scrollbars=yes, resizable=yes, width=480, height=340'); return false;"><span class="icon icon-motdepasse"></span>Mot de passe oublié</a>
			</div>
		</p>
	</div>
</fieldset>
