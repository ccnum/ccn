<div class="formulaire_spip formulaire_public_publier_article">
	[<p class="reponse_formulaire reponse_formulaire_ok">(#ENV*{message_ok})</p>]
	[<p class="reponse_formulaire reponse_formulaire_erreur">(#ENV*{message_erreur})</p>]

	<form method="post" action="#ENV{action}">
		<div>
			#ACTION_FORMULAIRE{#ENV{action}}

			<div class="editer-groupe">

				<div class="editer editer_titre obligatoire[ (#ENV**{erreurs}|table_valeur{titre}|oui)erreur]">
					<label for="titre"><:info_titre:></label>
					[<span class="erreur_message">(#ENV**{erreurs}|table_valeur{titre})</span>]
					<input
						type="text"
						class="text"
						name="titre"
						id="titre"
						value="#ENV{titre}" />
				</div>

				<div class="editer editer_texte obligatoire[ (#ENV**{erreurs}|table_valeur{texte}|oui)erreur]">
					<label for="texte"><:info_texte:></label>
					[<span class="erreur_message">(#ENV**{erreurs}|table_valeur{texte})</span>]

					<textarea name="texte"
                              id="texte"
                              rows="20"
                              class="inserer_barre_edition inserer_previsualisation"
                              data-barre="edition"
                              data-id="article-#ENV{id_article,new}"
                    >
                        #ENV{texte}
                    </textarea>
				</div>

			</div>

			<p class="boutons">
				<input
					type="submit"
					class="submit"
					value="<:bouton_enregistrer:>" />
			</p>

		</div>
	</form>
</div>
