<BOUCLE_principale(RUBRIQUES){id_rubrique}{tous}>
<!DOCTYPE html>
<html lang="fr" xml:lang="fr" xmlns="http://www.w3.org/1999/xhtml">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>[(#NOM_SITE_SPIP|textebrut)]</title>
	[<meta name="description" content="(#DESCRIPTIF_SITE_SPIP|couper{150}|textebrut)" />]
	<INCLURE{fond=inclure/head} />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
<a href="#contenu-principal" class="skip-link">Aller au contenu principal</a>
	<!-- BOUTON CONNEXION -->
	<INCLURE{fond=inclure/authentification} />
	<!-- ELEMENTS GRAPHIQUES-->
	<div id="book-top-left"><img src="#CHEMIN{img/global/border-book-top-left.png}" width="14" height="16" alt="" /></div>
	<div id="book-top-right"><img src="#CHEMIN{img/global/border-book-top-right.png}" width="14" height="16" alt="" /></div>
	<div id="book-bottom-left"><img src="#CHEMIN{img/global/border-book-bottom-left.png}" width="14" height="16" alt="" /></div>
	<div id="book-bottom-right"><img src="#CHEMIN{img/global/border-book-bottom-right.png}" width="14" height="16" alt="" /></div>
	<div id="book-middle-top-ecriture"><img src="#CHEMIN{img/global/book-middle-top.png}" width="300" height="6" alt="" /></div>
	<div id="book-middle-bottom-ecriture"><img src="#CHEMIN{img/global/book-middle-bottom.png}" width="300" height="5" alt="" /></div>

	<div class="stitches-ecriture">
		<div class="stitches-inner"><img src="#CHEMIN{img/global/stitches.png}" width="5" height="86" alt="" /></div>
		<div class="stitches-inner"><img src="#CHEMIN{img/global/stitches.png}" width="5" height="86" alt="" /></div>
		<div class="stitches-inner"><img src="#CHEMIN{img/global/stitches.png}" width="5" height="86" alt="" /></div>
	</div>

	<!-- RETOUR INDEX -->
	<div id="bouton-retour">
		<a href="#URL_SITE_SPIP">
			<img src="#CHEMIN{img/global/bt-retour.png}" alt="Retour à l'accueil"
				class="btn-rollover" data-src-hover="#CHEMIN{img/global/bt-retour-hover.png}"
				width="54" height="54" />
		</a>
	</div>
	[(#TITRE|=={'Blog pédagogique'}|non)<INCLURE{fond=inclure/rubrique,id_rubrique} />]
	[(#TITRE|=={'Blog pédagogique'}|et{#SESSION{id_auteur}|oui}|oui)<INCLURE{fond=inclure/rubrique-blogpeda,id_rubrique,id_article} />]

	<INCLURE{fond=footer} />
</body>

<style>
	.crayon-html {background-image:url('#CHEMIN{img/global/tooltip-background.png}');background-repeat:repeat;}
	.crayon-html .formulaire_spip textarea {height:300px;background-color:#FFF;}
	.formulaire_crayon {width:500px;margin-left:auto;margin-right:auto;margin-top:40px;z-index:9999}
	.resizehandle{display:none;}
	/*.markItUpFooter{display:none;}*/
	.crayon-html .crayon-boutons {position:relative;width: auto; padding: 10px 45px 0 0;margin:5px 0px 0px 0px; }
	.crayon-html .crayon-boutons button { width: auto; height: 32px; text-indent: 0; cursor: pointer; background: #ff6b6b; color: #FFF; border-radius: 5px; font-family:Arial, Helvetica, sans-serif; font-size:13px; margin:0px 0px 0px 10px; float:left;}
</style>

<script type="text/javascript" src="#CHEMIN{js/rubrique.js}"></script>

</html>
</BOUCLE_principale>
