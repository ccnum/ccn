#SET{domid,_#ENV{mode}|concat{'_',#ENV{id,new}}}
<div class='joindre_mode#GET{domid}' id='joindre_upload#GET{domid}'>
	<div class='editer editer_fichier_upload[ (#ENV*{erreurs/fichier_upload}|oui)erreur]'>
		<label for="fichier_upload#GET{domid}"><:bouton_download:></label>
		[<span class='erreur_message'>(#ENV*{erreurs/fichier_upload})</span>]
		<input class='file multi' type="file" name="fichier_upload[]" value='#ENV{fichier_upload}' id="fichier_upload#GET{domid}" accept="[(#CONFIG{formats_documents_forum})]" size='14' />
	</div>
	[<small>Formats autorisés : (#CONFIG{formats_documents_forum}|replace{',', ', '}) — max. (#CONFIG{bigup/max_file_size}) Mo</small>]
	<p class='boutons'><input class='submit' type="submit" name="joindre_upload" value="<:bouton_download:>"/></p>
</div>
