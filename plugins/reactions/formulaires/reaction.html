<div class="reactions_liste">
	[(#SET{mes_reactions, #ENV*{_mes_reactions}})]
    [(#SET{compteurs, #ENV{objet}|reactions_compter{#ENV{id_objet}}})]
    [(#SET{types_actifs, #URL_SITE_SPIP|reactions_types_actifs})]
    
    <BOUCLE_types(DATA){source tableau, #GET{types_actifs}}>
        <button type="button" 
                class="reaction_bouton[(#CLE|reaction_classe_active{#GET{mes_reactions}})]" 
                title="#CLE"
                data-action="#URL_ACTION_AUTEUR{poser_reaction, #ENV{objet}-#ENV{id_objet}-#CLE}"
                data-type="#CLE"
        >
            <span class="reaction_smiley">#VALEUR</span>
            <span class="reaction_compteur js-compteur-#CLE">[(#CLE|reaction_compteur{#GET{compteurs}})]</span>
        </button>
    </BOUCLE_types>
</div>

<script type="text/javascript">
$(function() {
    // On cible le clic sur les boutons de réaction
    $('.reaction_bouton').off('click').on('click', function(e) {
        e.preventDefault();
        
        var $btn = $(this);
        var urlAction = $btn.data('action');

        $.ajax({
            url: urlAction,
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                if (data.ok) {
                    // 1. Mise à jour de tous les compteurs numériques
                    $.each(data.compteurs, function(cle, total) {
                        $('.js-compteur-' + cle).text(total);
                    });

                    // 2. Mise à jour visuelle de la classe "active"
                    // On regarde ce que le fichier PHP (l'action) a renvoyé
                    if (data.action === 'pose') {
                        $btn.addClass('reaction_active');
                    } else if (data.action === 'retire') {
                        $btn.removeClass('reaction_active');
                    }
                } else {
                    console.error("Erreur SPIP détectée :", data.erreur);
                }
            },
            error: function(xhr, status, error) {
                console.error("Erreur réseau Ajax :", error);
            }
        });
    });
});
</script>
