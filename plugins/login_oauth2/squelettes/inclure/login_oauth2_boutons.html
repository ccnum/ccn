
<div class="login-oauth2">
	<div class="login-oauth2-separator">
		<span><:login_oauth2:ou:></span>
	</div>
	[<div class="login-oauth2-erreur">
		<p class="erreur_message">
			(#ENV{erreur})
		</p>
	</div>]
	<BOUCLE_providers(DATA){source tableau,#ENV{providers}}>
		<a class="oauth-btn oauth-#CLE" href="[(#URL_ACTION_AUTEUR{login_oauth2,#CLE})]">
			[(#CHEMIN_IMAGE{#CLE.svg}|balise_img{#VALEUR{label,#CLE}})]
			<span> <:login_oauth2:se_connecter_avec:> #VALEUR{label,#CLE} </span>
		</a>
	</BOUCLE_providers>
</div>
